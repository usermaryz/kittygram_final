name: Kittygram Workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    name: Test Code
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: kittygram_test
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./backend/requirements.txt

      - name: Lint with Ruff
        run: ruff check ./backend

      - name: Run Django tests
        env:
          DB_NAME: kittygram_test
          DB_USER: kittygram_user
          DB_PASSWORD: kittygram_password
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          cd backend
          python manage.py test

      - name: Run frontend tests
        run: |
          cd frontend
          npm ci
          npm test -- --watchAll=false

  build_and_push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  send_notification:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: build_and_push
    if: always()

    steps:
      - name: Send success notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Kittygram deployment successful!
            Workflow completed at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Images pushed:
            - ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
            - ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
            - ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

      - name: Send failure notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Kittygram deployment failed!
            Workflow failed at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
